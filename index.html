<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
*{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    list-style: none;
    text-decoration: none;
    font-family: "inter", sans-serif;
}
:root{
    --main_color : #ff8716;
    --p_color: #7b7b7b;
    --bg_color: #F3F3F3;
    --white_color: #fff;
    --color_heading: #121416;
    --border_color: #e5e5e5d5;
    --sale_color: #E51A1A; 
}
span{
    color: var(--main_color);
}
p{
    color: var(--p_color);
}
h1,h2,h3,h4,h5,h6{
    color: var(--color_heading);
    font-family: "DM sans", sans-serif;
}
img{
    width: 100%;
}
input,select,button{
    border: none;
    outline: none;
}
.container{
    width: 90%;
    margin: auto;
    max-width: 1350px;
}
@media (max-width:1350px)  {
    .container{
        width: 90%;
    }
}

/* start header */
header{
    background: #fff;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
}
header .top_header .container{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 0;
}
header .top_header .logo{
    width: 180px;
}
header .top_header .search_box{
    width: 610px;
    display: flex;
    align-items: center;
    border-radius: 2px;
    background-color: var(--bg_color);
}
header .top_header .search_box input{
    height: 55px;
    width: 400px;
    padding: 5px 15px 5px 10px;
    background: var(--bg_color);
}
header .top_header .search_box select_box{
    position: relative;

}
header .top_header .search_box select_box::after{
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    right: 0;
    width: 1px;
    height: 50%;
    background: #b9b9b9;
}
header .top_header .search_box select{
    height: 55px;
    width: 190px;
    background: var(--bg_color);
    font-size: 16px;
    cursor: pointer;
    padding-left: 10px;
    margin-right: 10px;
}
header .top_header .search_box select option{
    font-size: 15px;
}
header .top_header .search_box button{
    height: 55px;
    width: 60px;
    background: var(--main_color);
    font-size: 18px;
    cursor: pointer;
}
header .top_header .search_box button{
    color: var(--white_color);
}
header .top_header .header_icons{
    display: flex;
    gap: 30px;
}
header .top_header .header_icons .icon{
    position: relative;
    cursor: pointer;
}
header .top_header .header_icons .icon i{
    font-size: 24px;
}
header .top_header .header_icons .icon .count{
    position: relative;
    top: -10px;
    right: -10;
    width: 20px;
    height: 20px;
    text-align: center;
    line-height: 20px;
    background-color: var(--main_color);
    color: var(--white_color);
    font-size: 11px;
    border-radius: 100%;
}


    </style>
</head>
<body>

    <header>
        <div class="top_header">
            <div class="container">
                <a href="#" class="logo"> <img src="../images/store-icon-logo-illustration-vector.jpg" alt=""> </a>

                <form action="" class="search_box">
                    <div class="select_box">
                        <select id="category" name="category">
                            <option value="All Categories">All Categories</option>
                            <option value="Electonics & Digita">Electonics & Digita</option>
                            <option value="Phones & Tablety">Phones & Tablety</option>
                            <option value="Fashion & Clotings">Fashion & Clotings</option>
                            <option value="Televsion & Monitor">Televsion & Monitor</option>
                            <option value="Jewelry & Watches">Jewelry & Watches</option>
                            <option value="Washing & Maching">Washing & Maching</option>
                            <option value="Toys & Hobbies">Toys & Hobbies</option>
                        </select>
                    </div>

                    <input type="text" name="Search" id="Search" placeholder="Search for products" required>
                    <button type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
                <div class="header_icons">
                    <div class="icon">
                        <a href="#">
                            <i class="fa-solid fa-heart"></i>
                            <span class="count count_favorite">0</span>
                        </a>
                    </div>
                    <div class="icon">
                            <i class="fa-solid fa-cart-arrow-down"></i>
                            <span class="count count_item_header">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <script>
        // document.write("hello world")
    </script>
</body>
</html>
